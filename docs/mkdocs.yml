site_name: Alphabet dev docs
site_url: https://yt-redstone-mail-e7ec37.pages.prodcontest.com/
repo_url: https://gitlab.prodcontest.com/2026-final-users/backend/yt.redstone.mail
copyright: "&copy; Copyright Tapeline 2026"
nav:
  - Домашняя: index.md
  - Задание:
      - Условие: task/task.md
      - Критерии: task/criteria.md
  - Референс:
      - Глоссарий: glossary.md
      - Контроль доступа: usecases/01-access-control.md
      - Фича-флаги и эксперименты: usecases/02-feature-flags-experiments.md
      - Принятие решений и выдача: usecases/03-decision-making.md
      - События и статистика: usecases/04-stat-events.md
      - Отчёты: usecases/05-reports.md
      - Guardrails: usecases/06-guardrails.md
      - Уведомления: usecases/07-notifications.md
      - Insights UI: usecases/08-insights-ui.md
      - Библиотека экспериментов: usecases/09-library.md
      - Autoramp: usecases/10-autoramp.md
      - Разрешение конфликтов: usecases/11-conflicts-resolution.md
  - ADR:
      - Оглавление: adr/toc.md
      - 001 — Аутентификация: adr/001-auth.md


theme:
  name: material2014
  primary_color: "#673AB7"


plugins:
  - mermaid2
  - ezglossary:
      ignore_case: true
      tooltip: full
  - search:
      lang:
        - en
        - ru
  - macros:
      module_name: macros


markdown_extensions:
  - toc:
      toc_depth: 3
  - extra
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - def_list
  - material2014.extensions.tabbed
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true
  - mdx_include
