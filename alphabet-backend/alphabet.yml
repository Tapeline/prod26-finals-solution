postgres:
  host: localhost
  port: 5432
  username: pguser
  password: pgpass

valkey:
  host: localhost
  port: 6379
  username: default
  password: valkey_pass

clickhouse:
  host: localhost
  port: 8123
  username: chuser
  password: chpass
  database: default

app:
  cooldown_experiment_threshold: 1
  cooldown_for_s: 15

workers:
  attribution_interval_s: 5
  guardrail_interval_s: 5

event_buffer:
  size: 2000
  force_flush_interval_s: 5
