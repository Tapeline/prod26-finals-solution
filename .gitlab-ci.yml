image: python:3.13

before_script:
  - pip install uv

stages:
  - lint
  - test
  - coverage
  - build_deploy_docs

build-and-deploy-docs:
  stage: build_deploy_docs
  needs: []
  script:
    - cd docs
    - uv run mkdocs build --site-dir public
  artifacts:
    paths:
      - docs/public
  pages:
    publish: docs/public
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

run-lint:
  stage: lint
  needs: []
  script:
    - cd alphabet-backend
    - uv sync --group lint
    - uv run lint-imports
    - uv run ruff check
    - uv run mypy src
    # - uv run flake8 src
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

run-unit-tests:
  stage: test
  needs: [run-lint]
  script:
    - cd alphabet-backend
    - uv sync --group test
    - uv run coverage run -p -m pytest tests/unit -vvv --junit-xml=junit-report.xml
  artifacts:
    when: always
    paths:
      - alphabet-backend/junit-report.xml
      - alphabet-backend/.coverage.*
    reports:
      junit: alphabet-backend/junit-report.xml

run-integration-tests:
  stage: test
  needs: [run-lint]
  services:
    - name: docker:dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    # some fix from gemini idk
    - pip install uv
    - apt-get update && apt-get install -y docker.io curl
    - mkdir -p /usr/local/lib/docker/cli-plugins
    - curl -SL https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
    - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  script:
    - docker compose -f docker-compose.autotest.yml up -d test-clickhouse
    - cd alphabet-backend
    - uv sync --group test
    - uv run coverage run -p -m pytest tests/integration -vvv --junit-xml=junit-report.xml
  artifacts:
    when: always
    paths:
      - alphabet-backend/junit-report.xml
      - alphabet-backend/.coverage.*
    reports:
      junit: alphabet-backend/junit-report.xml

run-acceptance-tests:
  stage: test
  needs: [run-lint]
  services:
    - name: docker:dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    # some fix from gemini idk
    - pip install uv
    - apt-get update && apt-get install -y docker.io curl
    - mkdir -p /usr/local/lib/docker/cli-plugins
    - curl -SL https://github.com/docker/compose/releases/download/v2.29.2/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
    - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  script:
    - docker compose -f docker-compose.autotest.yml up -d
    - cd sys-tests
    - uv sync
    - sleep 15
    - APP_URL=http://docker:8000 uv run pytest tests -vvv --junit-xml=junit-report.xml
  after_script:
    - docker compose -f docker-compose.autotest.yml down
  artifacts:
    when: always
    paths:
      - sys-tests/junit-report.xml
      - .coverage_data/.coverage.*
    reports:
      junit: sys-tests/junit-report.xml

combine-report-coverage:
  stage: coverage
  needs:
    - run-unit-tests
    - run-integration-tests
    - run-acceptance-tests
  script:
    - cd alphabet-backend
    - uv sync --group test
    - cp ../.coverage_data/.coverage.* ./ || true
    - uv run coverage combine
    - uv run coverage report
    - uv run coverage xml -o coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - alphabet-backend/coverage.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: alphabet-backend/coverage.xml
