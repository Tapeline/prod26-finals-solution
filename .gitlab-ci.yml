run-acceptance-tests:
  stage: test
  image: docker:23.0.5
  services:
    - name: docker:dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip
    - pip install uv
  script:
    - docker compose up -d
    - cd sys-tests
    - uv sync
    - APP_URL=http://docker:8000 uv run pytest tests --junit-xml=junit-report.xml
  artifacts:
    when: always
    paths:
      - junit-report.xml
    reports:
      junit: junit-report.xml
